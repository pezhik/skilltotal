# GitHub secret-scanning configuration.
#
# This repo IS a secret scanner: its tests/ tree deliberately contains fake, non-functional
# tokens and credential markers as detection inputs. Exclude those paths from secret-scanning
# ALERTS (and from push protection for CUSTOM patterns) so the fixtures don't generate noise.
#
# NOTE: GitHub PARTNER patterns (e.g. a Hugging Face `hf_…` or AWS `AKIA…` token) on a PUBLIC
# repo are still enforced by push protection regardless of this file — that layer is not
# configurable. For those, test fixtures assemble the token at runtime via the `fake_token()`
# helper in tests/test_secrets.py so no contiguous provider-pattern literal is ever committed.
paths-ignore:
  - "tests/**"
