name: Release

# Publishes to PyPI on a version tag (vX.Y.Z) using Trusted Publishing (OIDC) — no API
# tokens stored. Configure a PyPI "pending publisher" for this repo/workflow first.
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Verify the tag matches the package version
        run: |
          PKG=$(python -c "import skilltotal; print(skilltotal.__version__)")
          TAG=${GITHUB_REF_NAME#v}
          test "$PKG" = "$TAG" || { echo "tag $TAG != version $PKG"; exit 1; }
      - name: Run tests before releasing
        run: |
          pip install -e ".[dev]"
          ruff check .
          pytest
          bandit -r skilltotal
      - name: Build sdist + wheel
        run: python -m build
      - name: Check artifacts
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
