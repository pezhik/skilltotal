name: Release

# Publishes to PyPI on a version tag (vX.Y.Z) using Trusted Publishing (OIDC) — no API
# tokens stored. Configure a PyPI "pending publisher" for this repo/workflow first.
on:
  push:
    tags: ["v*"]

# Least privilege by default; the publish job elevates id-token for OIDC.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Verify the tag matches the package version
        run: |
          PKG=$(python -c "import skilltotal; print(skilltotal.__version__)")
          TAG=${GITHUB_REF_NAME#v}
          test "$PKG" = "$TAG" || { echo "tag $TAG != version $PKG"; exit 1; }
      - name: Run tests before releasing
        run: |
          pip install -e ".[dev]"
          ruff check .
          pytest
          bandit -r skilltotal
      - name: Build sdist + wheel
        run: python -m build
      - name: Check artifacts
        run: twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
