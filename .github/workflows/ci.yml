name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs elevate only what they need (none here — read-only).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Static security scan (bandit)
        run: bandit -r skilltotal

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # full history so secret scanning covers all commits
      - name: Secret scan (gitleaks)
        # Run the binary directly (not the action) so `detect` scans the whole history
        # without the action's commit-range logic, which breaks on the first push (the
        # initial commit has no parent).
        run: |
          GL=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          # -c .gitleaks.toml allowlists this scanner's own fake-secret test fixtures
          # (production paths stay fully scanned).
          /tmp/gitleaks detect --source . --config .gitleaks.toml --redact -v --exit-code 1
