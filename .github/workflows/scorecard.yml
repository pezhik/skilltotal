name: Scorecard supply-chain security

# OpenSSF Scorecard: weekly + on push to the default branch. Publishes the result to the
# public OpenSSF registry (drives the README badge) and to GitHub Code Scanning.
on:
  branch_protection_rule:
  schedule:
    - cron: "27 5 * * 2"  # weekly, Tuesday 05:27 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload the SARIF result to code scanning
      id-token: write         # OIDC, required to publish results to the OpenSSF registry
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: results.sarif
