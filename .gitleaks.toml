# gitleaks configuration for the SkillTotal engine repo.
#
# This repo IS a secret scanner, so its own tests deliberately contain fake, non-functional
# secrets as detection inputs (e.g. tests/test_secrets.py: a dummy "AKIA…" AWS key, a fake
# "ghp_…" GitHub token, a placeholder OpenSSH private key). Those are not real credentials.
# We allowlist the test/fixture paths so gitleaks doesn't flag them, while every other path —
# notably the production engine in skilltotal/ — is still scanned with the full default ruleset.

[extend]
useDefault = true

[allowlist]
description = "Deliberate fake secrets in this secret-scanner's own test fixtures"
# The ENTIRE tests/ tree is this scanner's fixture corpus — its files deliberately contain fake
# tokens, credential paths and payloads as detection inputs. Allowlist the whole tree so a new
# fixture in ANY test file (not just test_secrets.py) can't fail gitleaks in CI/pre-commit.
# Production code (skilltotal/) is NOT allowlisted and stays under the full default ruleset; a
# real leak in production is still caught, and detect-secrets + GitHub push protection remain as
# independent layers over the whole repo.
paths = [
  '''tests/.*''',
]
